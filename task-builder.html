<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A/A App Hub — Task Builder</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500&f[]=sentient@400,400i&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F6F6F6;
  --white: #ffffff;
  --text: #181818;
  --muted: #888;
  --border: #E0DFD9;
  --radius: 14px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar: 240px;
}
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Satoshi', sans-serif; font-weight: 400; overflow: hidden; display: flex; flex-direction: column; }

/* ── NAV ── */
.nav-wrap { flex-shrink: 0; background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; z-index: 200; }
.nav-left { display: flex; align-items: center; gap: 16px; }
.nav-logo-link { display: flex; align-items: center; transition: opacity 0.2s; }
.nav-logo-link:hover { opacity: 0.7; }
.nav-logo-svg { height: 22px; width: auto; }
.nav-divider { width: 1px; height: 20px; background: var(--border); }
.nav-board-name { font-size: 13px; font-weight: 500; color: var(--text); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-family: 'Satoshi', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
.nav-btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
.nav-btn-ghost:hover { color: var(--text); border-color: var(--text); }
.nav-btn-primary { background: var(--text); color: #fff; }
.nav-btn-primary:hover { opacity: 0.75; }
.nav-search { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 12px; color: var(--muted); cursor: text; transition: border-color 0.2s; min-width: 180px; }
.nav-search input { border: none; background: none; outline: none; font-family: 'Satoshi', sans-serif; font-size: 12px; color: var(--text); width: 100%; }
.nav-search input::placeholder { color: var(--muted); }

/* ── APP LAYOUT ── */
.app-body { flex: 1; display: flex; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: var(--sidebar); background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.sidebar-section { padding: 16px; }
.sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding: 0 4px; }
.sidebar-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.2s; color: var(--text); border: none; background: none; width: 100%; text-align: left; font-family: 'Satoshi', sans-serif; font-weight: 400; }
.sidebar-item:hover { background: var(--bg); }
.sidebar-item.active { background: var(--text); color: #fff; font-weight: 500; }
.sidebar-item.active svg { stroke: #fff; }
.sidebar-item svg { flex-shrink: 0; }
.boards-list { display: flex; flex-direction: column; gap: 2px; max-height: 280px; overflow-y: auto; }
.board-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.board-item:hover { background: var(--bg); }
.board-item.active { background: var(--bg); font-weight: 500; }
.board-item-left { display: flex; align-items: center; gap: 8px; font-size: 13px; overflow: hidden; }
.board-color { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.board-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.board-delete { background: none; border: none; color: var(--muted); cursor: pointer; padding: 2px 4px; font-size: 14px; opacity: 0; transition: opacity 0.2s; line-height: 1; }
.board-item:hover .board-delete { opacity: 1; }
.sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }
.sidebar-back { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.sidebar-back:hover { color: var(--text); }

/* ── BOARD AREA ── */
.board-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* Home / empty state */
.home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 40px; }
.home-title { font-size: 32px; font-weight: 500; letter-spacing: -1px; text-align: center; }
.home-title em { font-family: 'Sentient', serif; font-style: italic; font-weight: 400; }
.home-boards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; width: 100%; max-width: 800px; }
.home-board-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: all 0.3s var(--ease); display: flex; flex-direction: column; gap: 10px; }
.home-board-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.home-board-card .hbc-color { width: 28px; height: 4px; border-radius: 2px; }
.home-board-card .hbc-name { font-size: 14px; font-weight: 500; letter-spacing: -0.3px; }
.home-board-card .hbc-count { font-size: 11px; color: var(--muted); }
.new-board-card { background: var(--bg); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; color: var(--muted); transition: all 0.2s; }
.new-board-card:hover { border-color: var(--text); color: var(--text); }

/* Board header */
.board-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--white); flex-shrink: 0; }
.board-header-title { font-size: 16px; font-weight: 500; letter-spacing: -0.5px; }
.board-header-title-input { font-size: 16px; font-weight: 500; letter-spacing: -0.5px; border: none; outline: none; background: none; font-family: 'Satoshi', sans-serif; color: var(--text); }
.board-dot { width: 10px; height: 10px; border-radius: 2px; }
.spacer { flex: 1; }

/* Kanban columns */
.kanban-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 20px 24px; display: flex; gap: 14px; align-items: flex-start; }
.column { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); width: 272px; flex-shrink: 0; display: flex; flex-direction: column; max-height: calc(100vh - 140px); }
.column-header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 8px; }
.column-title { font-size: 12px; font-weight: 500; letter-spacing: 0.3px; flex: 1; }
.column-title-input { font-size: 12px; font-weight: 500; letter-spacing: 0.3px; border: none; outline: none; background: none; font-family: 'Satoshi', sans-serif; color: var(--text); width: 100%; }
.col-count { font-size: 11px; color: var(--muted); background: var(--white); border: 1px solid var(--border); padding: 1px 7px; border-radius: 20px; }
.col-menu-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 3px; border-radius: 4px; transition: background 0.2s; line-height: 1; font-size: 16px; }
.col-menu-btn:hover { background: var(--border); color: var(--text); }

/* Cards */
.cards-list { padding: 0 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; min-height: 4px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.25s var(--ease); }
.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-1px); border-color: #ccc; }
.card.dragging { opacity: 0.4; }
.card-labels { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.card-label { font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; }
.card-title { font-size: 13px; font-weight: 400; line-height: 1.4; color: var(--text); }
.card-title.done { text-decoration: line-through; color: var(--muted); }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.card-checks { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.card-checks.complete { color: #1a7a35; }
.card-due { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
.card-due.overdue { background: #fff0f0; color: #cc3333; }
.card-due.today { background: #fff8e0; color: #a06000; }
.card-due.ok { background: #f0f0f0; color: var(--muted); }

/* Add card */
.add-card-area { padding: 6px 10px 10px; }
.add-card-input { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: 'Satoshi', sans-serif; font-size: 13px; color: var(--text); outline: none; resize: none; transition: border-color 0.2s; }
.add-card-input:focus { border-color: var(--text); }
.add-card-btn { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 8px; font-family: 'Satoshi', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; border: none; background: none; width: 100%; margin-top: 4px; }
.add-card-btn:hover { background: var(--white); color: var(--text); }
.add-card-actions { display: flex; gap: 6px; margin-top: 6px; }
.btn-xs { padding: 7px 14px; border-radius: 7px; font-family: 'Satoshi', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.2s; }
.btn-xs-primary { background: var(--text); color: #fff; }
.btn-xs-primary:hover { opacity: 0.75; }
.btn-xs-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-xs-ghost:hover { border-color: var(--text); }

/* Add column */
.add-column-btn { width: 240px; flex-shrink: 0; background: rgba(255,255,255,0.6); border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); transition: all 0.2s; align-self: flex-start; }
.add-column-btn:hover { background: var(--white); color: var(--text); border-color: var(--text); }

/* Drag over */
.column.drag-over .cards-list { background: rgba(24,24,24,0.04); border-radius: 8px; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); animation: fadeIn 0.2s var(--ease); }
.modal { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.15); animation: slideUp 0.3s var(--ease); }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.modal-title-input { font-size: 18px; font-weight: 500; letter-spacing: -0.5px; border: none; outline: none; background: none; font-family: 'Satoshi', sans-serif; color: var(--text); flex: 1; line-height: 1.3; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1; padding: 2px; transition: color 0.2s; flex-shrink: 0; margin-top: 2px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 20px; }
.modal-section-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

/* Labels in modal */
.labels-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.label-option { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; border: 2px solid transparent; transition: all 0.2s; opacity: 0.5; }
.label-option.selected { opacity: 1; border-color: rgba(0,0,0,0.2); }

/* Checklist */
.checklist { display: flex; flex-direction: column; gap: 6px; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg); border-radius: 8px; }
.check-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--text); flex-shrink: 0; }
.check-item-text { flex: 1; font-size: 13px; border: none; background: none; outline: none; font-family: 'Satoshi', sans-serif; color: var(--text); }
.check-item-text.done-text { text-decoration: line-through; color: var(--muted); }
.check-delete { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; opacity: 0; transition: opacity 0.2s; }
.check-item:hover .check-delete { opacity: 1; }
.progress-bar-wrap { background: var(--border); border-radius: 2px; height: 3px; margin-top: 4px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--text); border-radius: 2px; transition: width 0.4s var(--ease); }

/* Date + Description */
textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-family: 'Satoshi', sans-serif; font-size: 13px; color: var(--text); outline: none; resize: vertical; min-height: 80px; transition: border-color 0.2s; }
textarea:focus { border-color: var(--text); }
input[type="date"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'Satoshi', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
input[type="date"]:focus { border-color: var(--text); }
input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'Satoshi', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
input[type="text"]:focus { border-color: var(--text); }
input[type="text"]::placeholder { color: #bbb; }

.modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.btn-delete-card { background: none; border: none; color: #cc3333; font-size: 12px; font-family: 'Satoshi', sans-serif; cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: background 0.2s; }
.btn-delete-card:hover { background: #fff0f0; }

/* ── BOARD MODAL ── */
.board-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.board-modal { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 380px; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,0.15); animation: slideUp 0.3s var(--ease); }
.board-modal h3 { font-size: 16px; font-weight: 500; letter-spacing: -0.3px; margin-bottom: 20px; }
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.color-dot { width: 24px; height: 24px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
.color-dot:hover { transform: scale(1.15); }
.color-dot.selected { border-color: var(--text); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>

<div class="app-body">

  <div class="sidebar">
    <div class="sidebar-section">
      <button class="sidebar-item" id="homeBtn" onclick="showHome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    </div>
    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-back">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
        Voltar ao App Hub
      </a>
    </div>
  </div>

  <div class="board-area" id="boardArea">
    </div>

</div>

<div class="modal-overlay" id="cardModal" style="display:none" onclick="if(event.target===this) closeCardModal()">
  <div class="modal">
    <div class="modal-header">
      <input class="modal-title-input" id="modalCardTitle" type="text" placeholder="Título do cartão..." oninput="updateCardTitle(this.value)" />
      <button class="modal-close" onclick="closeCardModal()">×</button>
    </div>
    <div class="modal-body">

      <div>
        <div class="modal-section-label">Etiquetas</div>
        <div class="labels-grid" id="modalLabels"></div>
      </div>

      <div>
        <div class="modal-section-label">Descrição</div>
        <textarea id="modalDesc" placeholder="Adicione uma descrição..." oninput="updateCardDesc(this.value)"></textarea>
      </div>

      <div>
        <div class="modal-section-label">Data de entrega</div>
        <input type="date" id="modalDue" onchange="updateCardDue(this.value)" />
      </div>

      <div>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
          <div class="modal-section-label" style="margin-bottom:0">Checklist</div>
          <span id="checkProgress" style="font-size:11px; color:var(--muted)"></span>
        </div>
        <div class="progress-bar-wrap" id="checkProgressBar" style="display:none; margin-bottom:10px;">
          <div class="progress-bar-fill" id="checkProgressFill" style="width:0%"></div>
        </div>
        <div class="checklist" id="modalChecklist"></div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <input type="text" id="newCheckInput" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter') addCheckItem()" />
          <button class="btn-xs btn-xs-ghost" style="white-space:nowrap; width:auto" onclick="addCheckItem()">+ Adicionar</button>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-delete-card" onclick="deleteCurrentCard()">Excluir cartão</button>
      <button class="btn-xs btn-xs-primary" onclick="closeCardModal()">Salvar</button>
    </div>
  </div>
</div>

<div class="board-modal-overlay" id="boardModal" style="display:none" onclick="if(event.target===this) closeBoardModal()">
  <div class="board-modal">
    <h3>Novo quadro</h3>
    <div class="modal-section-label">Cor</div>
    <div class="color-picker" id="colorPicker"></div>
    <div style="margin-bottom:16px;">
      <div class="modal-section-label">Nome</div>
      <input type="text" id="boardNameInput" placeholder="Nome do quadro..." onkeydown="if(event.key==='Enter') createBoard()" />
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn-xs btn-xs-primary" style="flex:1; padding:10px" onclick="createBoard()">Criar quadro</button>
      <button class="btn-xs btn-xs-ghost" style="padding:10px 16px" onclick="closeBoardModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let state = JSON.parse(localStorage.getItem('aa_tasks') || 'null') || { boards: [], activeBoard: null };

const LABEL_PRESETS = [
  { id: 'l1', name: 'Urgente',    bg: '#fff0f0', color: '#cc3333' },
  { id: 'l2', name: 'Em andamento', bg: '#fff8e0', color: '#a06000' },
  { id: 'l3', name: 'Finalizado', bg: '#e6fff0', color: '#1a7a35' },
  { id: 'l4', name: 'Revisão',    bg: '#f0f0ff', color: '#4040cc' },
  { id: 'l5', name: 'Design',      bg: '#fdf0ff', color: '#8800cc' },
  { id: 'l6', name: 'Dev',         bg: '#f0f8ff', color: '#0066aa' },
];

const BOARD_COLORS = ['#181818','#cc3333','#1a7a35','#0066aa','#a06000','#8800cc','#888','#4a4a4a'];
let selectedColor = BOARD_COLORS[0];
let activeCardId = null;
let dragCard = null, dragSource = null;

function save() { localStorage.setItem('aa_tasks', JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// ── BOARD ──
function showBoardModal() {
  document.getElementById('boardModal').style.display = 'flex';
  document.getElementById('boardNameInput').value = '';
  setTimeout(() => document.getElementById('boardNameInput').focus(), 50);
  renderColorPicker();
}
function closeBoardModal() { document.getElementById('boardModal').style.display = 'none'; }

function renderColorPicker() {
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = BOARD_COLORS.map(c => `
    <div class="color-dot ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectedColor='${c}'; renderColorPicker()"></div>
  `).join('');
}

function createBoard() {
  const name = document.getElementById('boardNameInput').value.trim();
  if (!name) return;
  const board = { id: uid(), name, color: selectedColor, columns: [
    { id: uid(), title: 'A fazer', cards: [] },
    { id: uid(), title: 'Em andamento', cards: [] },
    { id: uid(), title: 'Concluído', cards: [] },
  ]};
  state.boards.push(board);
  state.activeBoard = board.id;
  save(); closeBoardModal(); render();
}

function deleteBoard(id, e) {
  e.stopPropagation();
  if (!confirm('Excluir este quadro?')) return;
  state.boards = state.boards.filter(b => b.id !== id);
  if (state.activeBoard === id) state.activeBoard = null;
  save(); render();
}

function openBoard(id) {
  state.activeBoard = id;
  save(); render();
}

function showHome() {
  state.activeBoard = null;
  save(); render();
}

function getActiveBoard() { return state.boards.find(b => b.id === state.activeBoard); }

// ── COLUMN ──
function addColumn() {
  const board = getActiveBoard(); if (!board) return;
  board.columns.push({ id: uid(), title: 'Nova lista', cards: [] });
  save(); renderBoard();
}

function deleteColumn(colId) {
  const board = getActiveBoard(); if (!board) return;
  board.columns = board.columns.filter(c => c.id !== colId);
  save(); renderBoard();
}

function renameColumn(colId, val) {
  const board = getActiveBoard(); if (!board) return;
  const col = board.columns.find(c => c.id === colId);
  if (col) { col.title = val; save(); }
}

// ── CARD ──
function addCard(colId, title) {
  const board = getActiveBoard(); if (!board) return;
  const col = board.columns.find(c => c.id === colId); if (!col) return;
  col.cards.push({ id: uid(), title, desc: '', due: '', labels: [], checks: [] });
  save(); renderBoard();
}

function deleteCard(cardId) {
  const board = getActiveBoard(); if (!board) return;
  board.columns.forEach(col => { col.cards = col.cards.filter(c => c.id !== cardId); });
  save(); renderBoard();
}

function getCard(cardId) {
  const board = getActiveBoard(); if (!board) return null;
  for (const col of board.columns) {
    const c = col.cards.find(c => c.id === cardId);
    if (c) return c;
  }
  return null;
}

// ── CARD MODAL ──
function openCard(cardId) {
  activeCardId = cardId;
  const card = getCard(cardId); if (!card) return;
  document.getElementById('modalCardTitle').value = card.title;
  document.getElementById('modalDesc').value = card.desc || '';
  document.getElementById('modalDue').value = card.due || '';
  renderModalLabels(card);
  renderChecklist(card);
  document.getElementById('cardModal').style.display = 'flex';
}

function closeCardModal() {
  document.getElementById('cardModal').style.display = 'none';
  activeCardId = null;
  renderBoard();
}

function deleteCurrentCard() {
  if (!activeCardId) return;
  deleteCard(activeCardId);
  document.getElementById('cardModal').style.display = 'none';
  activeCardId = null;
}

function updateCardTitle(val) {
  const c = getCard(activeCardId); if (c) { c.title = val; save(); }
}
function updateCardDesc(val) {
  const c = getCard(activeCardId); if (c) { c.desc = val; save(); }
}
function updateCardDue(val) {
  const c = getCard(activeCardId); if (c) { c.due = val; save(); }
}

function renderModalLabels(card) {
  const wrap = document.getElementById('modalLabels');
  wrap.innerHTML = LABEL_PRESETS.map(l => {
    const sel = card.labels.includes(l.id);
    return `<div class="label-option ${sel?'selected':''}" style="background:${l.bg};color:${l.color}" onclick="toggleLabel('${l.id}')">${l.name}</div>`;
  }).join('');
}

function toggleLabel(lid) {
  const c = getCard(activeCardId); if (!c) return;
  const idx = c.labels.indexOf(lid);
  if (idx >= 0) c.labels.splice(idx, 1); else c.labels.push(lid);
  save(); renderModalLabels(c);
}

// ── CHECKLIST ──
function renderChecklist(card) {
  const list = document.getElementById('modalChecklist');
  const checks = card.checks || [];
  list.innerHTML = checks.map((ch, i) => `
    <div class="check-item">
      <input type="checkbox" ${ch.done?'checked':''} onchange="toggleCheck(${i}, this.checked)" />
      <input class="check-item-text ${ch.done?'done-text':''}" type="text" value="${ch.text}" onchange="updateCheckText(${i}, this.value)" />
      <button class="check-delete" onclick="deleteCheck(${i})">×</button>
    </div>
  `).join('');
  updateCheckProgress(card);
}

function updateCheckProgress(card) {
  const checks = card.checks || [];
  const done = checks.filter(c => c.done).length;
  const total = checks.length;
  const bar = document.getElementById('checkProgressBar');
  const fill = document.getElementById('checkProgressFill');
  const prog = document.getElementById('checkProgress');
  if (total > 0) {
    bar.style.display = 'block';
    fill.style.width = `${Math.round(done/total*100)}%`;
    prog.textContent = `${done}/${total}`;
  } else {
    bar.style.display = 'none';
    prog.textContent = '';
  }
}

function addCheckItem() {
  const inp = document.getElementById('newCheckInput');
  const text = inp.value.trim(); if (!text) return;
  const c = getCard(activeCardId); if (!c) return;
  if (!c.checks) c.checks = [];
  c.checks.push({ text, done: false });
  save(); renderChecklist(c); inp.value = '';
}

function toggleCheck(idx, done) {
  const c = getCard(activeCardId); if (!c) return;
  c.checks[idx].done = done; save(); renderChecklist(c);
}

function updateCheckText(idx, text) {
  const c = getCard(activeCardId); if (!c) return;
  c.checks[idx].text = text; save();
}

function deleteCheck(idx) {
  const c = getCard(activeCardId); if (!c) return;
  c.checks.splice(idx, 1); save(); renderChecklist(c);
}

// ── DRAG & DROP ──
function onDragStart(e, cardId, colId) {
  dragCard = cardId; dragSource = colId;
  setTimeout(() => document.querySelector(`[data-card-id="${cardId}"]`)?.classList.add('dragging'), 0);
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd() {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
}

function onDragOver(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  document.querySelector(`[data-col-id="${colId}"]`)?.classList.add('drag-over');
}

function onDrop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  if (!dragCard || dragSource === colId) return;
  const board = getActiveBoard(); if (!board) return;
  const srcCol = board.columns.find(c => c.id === dragSource);
  const dstCol = board.columns.find(c => c.id === colId);
  if (!srcCol || !dstCol) return;
  const card = srcCol.cards.find(c => c.id === dragCard);
  if (!card) return;
  srcCol.cards = srcCol.cards.filter(c => c.id !== dragCard);
  dstCol.cards.push(card);
  save(); renderBoard();
}

// ── SEARCH ──
function filterCards(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.card').forEach(el => {
    const title = el.querySelector('.card-title')?.textContent.toLowerCase() || '';
    el.style.display = (!q || title.includes(q)) ? '' : 'none';
  });
}

// ── RENDER ──
function render() {
  renderSidebar();
  if (state.activeBoard) renderBoard(); else renderHome();
}

function renderSidebar() {
  const list = document.getElementById('boardsList');
  const homeBtn = document.getElementById('homeBtn');
  homeBtn.classList.toggle('active', !state.activeBoard);
  list.innerHTML = state.boards.map(b => `
    <div class="board-item ${b.id===state.activeBoard?'active':''}" onclick="openBoard('${b.id}')">
      <div class="board-item-left">
        <div class="board-color" style="background:${b.color}"></div>
        <span class="board-name">${b.name}</span>
      </div>
      <button class="board-delete" onclick="deleteBoard('${b.id}', event)">×</button>
    </div>
  `).join('');
  const board = getActiveBoard();
  document.getElementById('navBoardName').textContent = board ? board.name : 'Página inicial';
}

function renderHome() {
  const area = document.getElementById('boardArea');
  const total = state.boards.reduce((s, b) => s + b.columns.reduce((ss, c) => ss + c.cards.length, 0), 0);
  area.innerHTML = `
    <div class="home-screen">
      <div>
        <p style="font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:14px">A/A Task Builder</p>
        <h2 class="home-title">Seus <em>quadros</em></h2>
        <p style="font-size:13px;color:var(--muted);text-align:center;margin-top:10px">${state.boards.length} quadro${state.boards.length!==1?'s':''} · ${total} cartão${total!==1?'es':''}</p>
      </div>
      <div class="home-boards-grid">
        ${state.boards.map(b => {
          const cards = b.columns.reduce((s, c) => s + c.cards.length, 0);
          return `<div class="home-board-card" onclick="openBoard('${b.id}')">
            <div class="hbc-color" style="background:${b.color}"></div>
            <div class="hbc-name">${b.name}</div>
            <div class="hbc-count">${cards} cartão${cards!==1?'es':''}</div>
          </div>`;
        }).join('')}
        <div class="new-board-card" onclick="showBoardModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Novo quadro
        </div>
      </div>
    </div>
  `;
}

function renderBoard() {
  const board = getActiveBoard();
  const area = document.getElementById('boardArea');
  if (!board) { renderHome(); return; }

  const dot = `<div class="board-dot" style="background:${board.color}"></div>`;
  const colsHTML = board.columns.map(col => {
    const cardsHTML = col.cards.map(card => renderCardHTML(card)).join('');
    return `
      <div class="column" data-col-id="${col.id}"
           ondragover="onDragOver(event,'${col.id}')"
           ondrop="onDrop(event,'${col.id}')">
        <div class="column-header">
          <input class="column-title-input" value="${col.title}" onchange="renameColumn('${col.id}',this.value)" />
          <span class="col-count">${col.cards.length}</span>
          <button class="col-menu-btn" onclick="deleteColumn('${col.id}')" title="Remover lista">×</button>
        </div>
        <div class="cards-list" id="cards-${col.id}">${cardsHTML}</div>
        <div class="add-card-area" id="addArea-${col.id}">
          <button class="add-card-btn" onclick="showAddCard('${col.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adicionar cartão
          </button>
        </div>
      </div>`;
  }).join('');

  area.innerHTML = `
    <div class="board-header">
      ${dot}
      <input class="board-header-title-input" value="${board.name}" onchange="renameBoard('${board.id}',this.value)" />
      <div class="spacer"></div>
    </div>
    <div class="kanban-scroll">
      ${colsHTML}
      <button class="add-column-btn" onclick="addColumn()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar nova lista
      </button>
    </div>
  `;
}

function renderCardHTML(card) {
  const labelsBadges = (card.labels || []).map(lid => {
    const l = LABEL_PRESETS.find(p => p.id === lid);
    return l ? `<span class="card-label" style="background:${l.bg};color:${l.color}">${l.name}</span>` : '';
  }).join('');

  const checks = card.checks || [];
  const done = checks.filter(c => c.done).length;
  const checksHTML = checks.length ? `
    <div class="card-checks ${done===checks.length&&checks.length>0?'complete':''}">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      ${done}/${checks.length}
    </div>` : '';

  let dueHTML = '';
  if (card.due) {
    const today = new Date().toISOString().split('T')[0];
    const cls = card.due < today ? 'overdue' : card.due === today ? 'today' : 'ok';
    const fmt = new Date(card.due + 'T12:00').toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
    dueHTML = `<span class="card-due ${cls}">${fmt}</span>`;
  }

  const hasFooter = checks.length || card.due;

  return `
    <div class="card" data-card-id="${card.id}" draggable="true"
         ondragstart="onDragStart(event,'${card.id}','${findColId(card.id)}')"
         ondragend="onDragEnd()"
         onclick="openCard('${card.id}')">
      ${labelsBadges ? `<div class="card-labels">${labelsBadges}</div>` : ''}
      <div class="card-title">${card.title}</div>
      ${hasFooter ? `<div class="card-footer">${checksHTML}${dueHTML}</div>` : ''}
    </div>`;
}

function findColId(cardId) {
  const board = getActiveBoard(); if (!board) return '';
  for (const col of board.columns) if (col.cards.find(c => c.id === cardId)) return col.id;
  return '';
}

function renameBoard(id, val) {
  const b = state.boards.find(b => b.id === id);
  if (b) { b.name = val; save(); renderSidebar(); }
}

// ── ADD CARD INLINE ──
function showAddCard(colId) {
  const area = document.getElementById(`addArea-${colId}`);
  area.innerHTML = `
    <textarea class="add-card-input" id="addInput-${colId}" placeholder="Título do cartão..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();confirmAddCard('${colId}')}"></textarea>
    <div class="add-card-actions">
      <button class="btn-xs btn-xs-primary" onclick="confirmAddCard('${colId}')">Adicionar</button>
      <button class="btn-xs btn-xs-ghost" onclick="cancelAddCard('${colId}')">Cancelar</button>
    </div>`;
  setTimeout(() => document.getElementById(`addInput-${colId}`)?.focus(), 50);
}

function confirmAddCard(colId) {
  const inp = document.getElementById(`addInput-${colId}`);
  const title = inp?.value.trim(); if (!title) return cancelAddCard(colId);
  addCard(colId, title);
}

function cancelAddCard(colId) {
  const area = document.getElementById(`addArea-${colId}`);
  if (area) area.innerHTML = `
    <button class="add-card-btn" onclick="showAddCard('${colId}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar cartão
    </button>`;
}

render();
</script>
</body>
</html>
